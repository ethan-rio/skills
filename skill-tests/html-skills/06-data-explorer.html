<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Recent deployments — explorer</title>
<style>
:root{
  --bg:#0b0e13; --panel:#11161e; --rule:#222a36; --ink:#e6ebf2; --mute:#8a93a0;
  --ok:#3fb950; --warn:#d29922; --err:#f85149; --info:#79c0ff;
  --mono:ui-monospace,Menlo,monospace; --sans:Inter,system-ui,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:13px;line-height:1.5}
.wrap{max-width:1320px;margin:0 auto;padding:24px 18px 60px}
header{margin-bottom:14px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute)}
h1{font-size:22px;margin:4px 0;font-weight:600}
.sub{color:var(--mute);font-size:13px}
.bar{display:flex;gap:10px;flex-wrap:wrap;background:var(--panel);border:1px solid var(--rule);border-radius:8px;padding:10px 12px;margin-bottom:14px;align-items:center}
.bar input[type=text]{flex:1;min-width:200px;background:#0b0e13;color:var(--ink);border:1px solid var(--rule);border-radius:6px;padding:7px 10px;font:13px var(--mono)}
.facet{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-family:var(--mono);font-size:11px;padding:4px 9px;border:1px solid var(--rule);border-radius:99px;color:var(--mute);cursor:pointer;user-select:none}
.chip.on{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.chip[data-facet="status"][data-val="success"].on{background:var(--ok);color:#0b0e13;border-color:var(--ok)}
.chip[data-facet="status"][data-val="failed"].on{background:var(--err);color:#0b0e13;border-color:var(--err)}
.chip[data-facet="status"][data-val="rolled_back"].on{background:var(--warn);color:#0b0e13;border-color:var(--warn)}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--rule);border-radius:8px;overflow:hidden}
th,td{padding:8px 12px;border-bottom:1px solid var(--rule);text-align:left;font-family:var(--mono);font-size:12px;vertical-align:top}
th{background:#161c26;color:var(--mute);text-transform:uppercase;letter-spacing:.08em;font-size:10.5px;cursor:pointer;user-select:none}
th .arrow{color:var(--info)}
tr:hover td{background:#0e1419}
.status{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10.5px;font-weight:600}
.status.success{background:#0e2a16;color:var(--ok)} .status.failed{background:#3a1014;color:var(--err)} .status.rolled_back{background:#3d2e0c;color:var(--warn)}
.dur{font-variant-numeric:tabular-nums}
.foot{margin-top:10px;display:flex;justify-content:space-between;color:var(--mute);font-family:var(--mono);font-size:12px}
.empty{padding:30px;text-align:center;color:var(--mute);font-style:italic}
</style>
</head>
<body>
<div class="wrap">
<header>
<div>
<div class="eyebrow">Data explorer · /deployments · last 30 days</div>
<h1>Recent deployments</h1>
<div class="sub">412 events · grouped by service, filterable by status, env, owner. Click headers to sort. Free-text search across service, owner, and SHA.</div>
</div>
</header>

<div class="bar">
<input type="text" id="q" placeholder="search service, owner, SHA…" />
<div class="facet" id="status_chips">
<span class="chip" data-facet="status" data-val="success">success</span>
<span class="chip" data-facet="status" data-val="failed">failed</span>
<span class="chip" data-facet="status" data-val="rolled_back">rolled_back</span>
</div>
<div class="facet" id="env_chips">
<span class="chip" data-facet="env" data-val="prod">prod</span>
<span class="chip" data-facet="env" data-val="staging">staging</span>
<span class="chip" data-facet="env" data-val="dev">dev</span>
</div>
<span class="chip" id="reset" style="border-color:var(--info);color:var(--info)">reset</span>
</div>

<table id="t">
<thead><tr>
<th data-k="time">when <span class="arrow"></span></th>
<th data-k="service">service <span class="arrow"></span></th>
<th data-k="env">env <span class="arrow"></span></th>
<th data-k="status">status <span class="arrow"></span></th>
<th data-k="duration_s">dur (s) <span class="arrow"></span></th>
<th data-k="owner">owner <span class="arrow"></span></th>
<th data-k="sha">sha <span class="arrow"></span></th>
</tr></thead>
<tbody id="tb"></tbody>
</table>

<div class="foot">
<span id="count"></span>
<span id="agg"></span>
</div>
</div>

<script>
const services = ['aurora-api','auth-svc','notes-svc','search-svc','workers','aurora-web'];
const envs=['prod','staging','dev'];
const statuses=['success','success','success','success','success','failed','rolled_back']; // skewed
const owners=['erin','ji','marcus','priya','dev','dani'];
function sha(){return Math.random().toString(16).slice(2,9)}
function rand(a){return a[Math.floor(Math.random()*a.length)]}
const seed=42; let s=seed; const r=()=>(s=(s*9301+49297)%233280)/233280;
const rows=[];
const now=Date.now();
for(let i=0;i<58;i++){
  rows.push({
    id:'d_'+i,
    time: new Date(now - r()*30*86400000).toISOString().replace('T',' ').slice(0,16),
    service: services[Math.floor(r()*services.length)],
    env: envs[Math.floor(r()*envs.length)],
    status: statuses[Math.floor(r()*statuses.length)],
    duration_s: Math.round(40 + r()*620),
    owner: owners[Math.floor(r()*owners.length)],
    sha: sha()
  });
}

let q='', sortK='time', sortDir='desc';
const facets={status:new Set(), env:new Set()};

document.querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click', ()=>{
    if(c.id==='reset'){ facets.status.clear(); facets.env.clear(); q=''; document.getElementById('q').value=''; document.querySelectorAll('.chip.on').forEach(x=>x.classList.remove('on')); render(); return; }
    const f=c.dataset.facet, v=c.dataset.val;
    if(facets[f].has(v)){ facets[f].delete(v); c.classList.remove('on'); } else { facets[f].add(v); c.classList.add('on'); }
    render();
  });
});
document.getElementById('q').addEventListener('input',e=>{q=e.target.value.toLowerCase();render();});
document.querySelectorAll('th').forEach(th=>{
  th.addEventListener('click',()=>{
    const k=th.dataset.k;
    if(sortK===k) sortDir=sortDir==='asc'?'desc':'asc'; else { sortK=k; sortDir='asc'; }
    document.querySelectorAll('th .arrow').forEach(a=>a.textContent='');
    th.querySelector('.arrow').textContent = sortDir==='asc'?'↑':'↓';
    render();
  });
});

function render(){
  let r = rows.filter(x=>{
    if(facets.status.size && !facets.status.has(x.status)) return false;
    if(facets.env.size && !facets.env.has(x.env)) return false;
    if(q && !(x.service+' '+x.owner+' '+x.sha).toLowerCase().includes(q)) return false;
    return true;
  });
  r.sort((a,b)=>{
    let av=a[sortK], bv=b[sortK];
    if(typeof av==='number'){ return sortDir==='asc'?av-bv:bv-av; }
    return sortDir==='asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });
  const tb=document.getElementById('tb'); tb.textContent='';
  if(r.length===0){
    const tr=document.createElement('tr'); const td=document.createElement('td'); td.colSpan=7; td.className='empty'; td.textContent='no rows match'; tr.appendChild(td); tb.appendChild(tr);
  } else {
    r.forEach(x=>{
      const tr=document.createElement('tr');
      const cells=[x.time,x.service,x.env];
      cells.forEach(v=>{const td=document.createElement('td');td.textContent=v;tr.appendChild(td);});
      const ts=document.createElement('td'); const sp=document.createElement('span'); sp.className='status '+x.status; sp.textContent=x.status; ts.appendChild(sp); tr.appendChild(ts);
      const td=document.createElement('td'); td.className='dur'; td.textContent=x.duration_s; tr.appendChild(td);
      [x.owner,x.sha].forEach(v=>{const td=document.createElement('td');td.textContent=v;tr.appendChild(td);});
      tb.appendChild(tr);
    });
  }
  document.getElementById('count').textContent = r.length+' / '+rows.length+' rows';
  const fail = r.filter(x=>x.status==='failed').length;
  const ok = r.filter(x=>x.status==='success').length;
  const avg = r.length ? (r.reduce((s,x)=>s+x.duration_s,0)/r.length).toFixed(0) : 0;
  document.getElementById('agg').textContent = `success ${ok} · failed ${fail} · avg ${avg}s`;
}
render();
</script>
</body>
</html>
